---
# Minimal example that renders one converted PNG image once on boot.
# Generate the image with scripts/convert_image.py so the
# file already matches the display's six-color palette.

substitutions:
  device_name: image
  friendly_name: Epaper Spectra 133 Image

packages:
  board: !include ../packages/boards/goo_display/esp32_133c02.yaml
  update_check: !include ../packages/update_check.yaml

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    # PSRAM is required — the 1200×1600 framebuffer is ~960 KB.
    board_build.psram: enabled
  on_boot:
    # Render after all components have initialised (priority -100 = last).
    priority: -100
    then:
      - component.update: epd

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${friendly_name}
    password: "12345678"

captive_portal:

# The default partition table is too small for large embedded image assets.
# This custom table (without OTA slots) allocates more flash to the app binary.
esp32:
  flash_size: 8MB
  partitions: partitions/large_app_8mb.csv

external_components:
  - source:
      # Local source used by this repository for development and CI.
      type: local
      path: ../components

      # In your own ESPHome config, use the released GitHub version instead:
      # type: git
      # url: https://github.com/philippwaller/esphome-epaper-spectra6-133
      # ref: v0.3.1  # x-release-please-version

image:
  - file: images/molly-porter-K7oqWgDJQ6E-unsplash-default-atkinson.png
    id: img_artwork
    type: RGB565

display:
  - platform: epaper_spectra6_133
    id: epd
    rotation: 0
    # Render once on boot; no periodic refresh.
    update_interval: never
    cs0_pin: ${epd_cs0_pin}
    cs1_pin: ${epd_cs1_pin}
    clk_pin: ${epd_clk_pin}
    data0_pin: ${epd_data0_pin}
    data1_pin: ${epd_data1_pin}
    busy_pin: ${epd_busy_pin}
    reset_pin: ${epd_reset_pin}
    power_pin: ${epd_power_pin}
    lambda: |-
      // Draw the image centred on the display.
      const int x = (it.get_width()  - id(img_artwork).get_width())  / 2;
      const int y = (it.get_height() - id(img_artwork).get_height()) / 2;
      it.image(x, y, id(img_artwork));
