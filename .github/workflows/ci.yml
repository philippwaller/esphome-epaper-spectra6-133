name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
permissions:
  actions: read
  contents: read
  pull-requests: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_all: >-
        ${{ github.event_name == 'push' ||
            github.event_name == 'merge_group' ||
            github.event_name == 'workflow_dispatch' }}
      ci: ${{ steps.filter.outputs.ci }}
      python: ${{ steps.filter.outputs.python }}
      cpp: ${{ steps.filter.outputs.cpp }}
      esphome_configs: ${{ steps.filter.outputs.esphome_configs }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4
        id: filter
        with:
          filters: |
            ci:
              - '.github/workflows/**/*.{yml,yaml}'
              - '.github/actions/**/*.{yml,yaml}'
            python:
              - 'components/epaper_spectra6_133/**/*.py'
            cpp:
              - '.clang-format'
              - 'components/epaper_spectra6_133/**/*.{c,cc,cpp,cxx,h,hh,hpp}'
              - 'tests/**/*.{c,cc,cpp,cxx,h,hh,hpp}'
              - 'tests/CMakeLists.txt'
              - 'requirements-dev.txt'
              - 'scripts/setup.sh'
              - 'scripts/run-host-tests.sh'
            esphome_configs:
              - 'configs/**/*.{yaml,yml}'
              - 'packages/**/*.{yaml,yml}'
              - 'partitions/**/*'
              - 'requirements.txt'
              - 'requirements-dev.txt'
              - 'components/epaper_spectra6_133/**/*.{py,c,cc,cpp,cxx,h,hh,hpp}'
              - '.github/actions/**/*.{yml,yaml}'
              - 'scripts/esphomew'
              - 'scripts/setup.sh'
              - 'scripts/validate-configs.sh'
              - 'scripts/compile-configs.sh'
              - 'scripts/esphome-versions.py'

  esphome-compatibility:
    name: ESPHome Compatibility Window
    needs: changes
    if: >-
      needs.changes.outputs.run_all == 'true' ||
      needs.changes.outputs.esphome_configs == 'true' ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.cpp == 'true' ||
      needs.changes.outputs.ci == 'true'
    uses: ./.github/workflows/esphome-compatibility.yml
    with:
      run_mode: compatibility-window

  lint:
    name: Lint and Format Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: ./.github/actions/setup-python-env
        with:
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Restore pre-commit hook environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Set up local developer environment
        run: bash ./scripts/setup.sh
      - name: Run pre-commit checks
        run: ./.venv/bin/pre-commit run --all-files --show-diff-on-failure

  cpp-tests:
    name: Host C++ Tests
    needs: changes
    if: needs.changes.outputs.run_all == 'true' || needs.changes.outputs.cpp == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: ./.github/actions/setup-python-env
        with:
          cache-dependency-path: requirements-dev.txt
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Run host tests and build coverage report
        run: bash ./scripts/run-host-tests.sh
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: host-cpp-coverage
          path: build/coverage
          if-no-files-found: ignore
