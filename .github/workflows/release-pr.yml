---
name: Release PR
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        type: choice
        required: true
        default: stable
        options:
          - stable
          - beta
          - rc
      release_as:
        description: "Explicit version override such as 0.4.0-beta.1, 0.4.0-rc.1, or 0.4.0"
        type: string
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Prepare Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Run Release Please
        if: ${{ github.event_name == 'push' }}
        uses: googleapis/release-please-action@c2a5a2bd6a758a0937f1ddb1e8950609867ed15c  # v4.3.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        if: ${{ github.event_name == 'workflow_dispatch' }}
        with:
          persist-credentials: false

      - name: Run Release Please for selected channel
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANNEL: ${{ inputs.channel }}
          RELEASE_AS: ${{ inputs.release_as }}
        run: |
          github_release_args=(
            "--token=${GITHUB_TOKEN}"
            "--repo-url=${GITHUB_REPOSITORY}"
            "--config-file=release-please-config.json"
            "--manifest-file=.release-please-manifest.json"
          )

          release_pr_args=(
            "--token=${GITHUB_TOKEN}"
            "--repo-url=${GITHUB_REPOSITORY}"
            "--config-file=release-please-config.json"
            "--manifest-file=.release-please-manifest.json"
          )

          case "${CHANNEL}" in
            beta|rc)
              github_release_args+=("--prerelease")
              release_pr_args+=("--snapshot" "--prerelease-type=${CHANNEL}")
              ;;
            stable)
              ;;
            *)
              echo "::error title=Invalid release channel::${CHANNEL}"
              exit 1
              ;;
          esac

          if [ -n "${RELEASE_AS}" ]; then
            release_pr_args+=("--release-as=${RELEASE_AS}")
          fi

          npx --yes release-please@16 github-release "${github_release_args[@]}"
          npx --yes release-please@16 release-pr "${release_pr_args[@]}"
