# CI compatibility fixture for deprecated configuration and C++ APIs.
#
# This file intentionally uses options and methods that are deprecated and will be
# removed before the stable 1.0 release. Do not copy from this config for new
# devices; use the other examples in this repository instead.

substitutions:
  device_name: spectra6-deprecated
  friendly_name: Spectra 6 Deprecated

  # Adjust these pins to match your board.
  epd_cs0_pin: "18"
  epd_cs1_pin: "17"
  epd_clk_pin: "9"
  epd_data0_pin: "41"
  epd_data1_pin: "40"
  epd_busy_pin: "7"
  epd_reset_pin: "6"
  epd_power_pin: "45"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.psram: enabled
  on_boot:
    priority: -100
    then:
      - component.update: epd

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO
  logs:
    epaper_spectra6_133: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  - platform: esphome
    password: !secret ota_password

external_components:
  - source:
      # Local source used by this repository for development and CI.
      type: local
      path: ../components

      # In your own ESPHome config, use the released GitHub version instead:
      # type: git
      # url: https://github.com/philippwaller/esphome-epaper-spectra6-133
      # ref: v0.3.0  # x-release-please-version

font:
  - file: gfonts://Bebas Neue
    id: font_hero
    size: 250

display:
  - platform: epaper_spectra6_133
    id: epd
    update_interval: never
    cs0_pin: ${epd_cs0_pin}
    cs1_pin: ${epd_cs1_pin}
    clk_pin: ${epd_clk_pin}
    data0_pin: ${epd_data0_pin}
    data1_pin: ${epd_data1_pin}
    busy_pin: ${epd_busy_pin}
    reset_pin: ${epd_reset_pin}
    power_pin: ${epd_power_pin}
    # Deprecated YAML compatibility path. Use refresh_mode in real configs.
    update_mode: full
    lambda: |-
      // Textbox with double border and red fill
      it.filled_rectangle(134, 413, 931, 773, Color(255, 0, 0));
      it.filled_rectangle(137, 416, 925, 767, Color(255, 255, 255));
      it.filled_rectangle(147, 426, 905, 747, Color(255, 255, 0));
      it.filled_rectangle(159, 438, 881, 723, Color(255, 0, 0));

      it.print(it.get_width() / 2, 637, id(font_hero), Color(255, 255, 0), TextAlign::CENTER, "PLEASE");
      it.print(it.get_width() / 2, 965, id(font_hero), Color(255, 255, 0), TextAlign::CENTER, "MIGRATE");

button:
  - platform: template
    name: Deprecated Flush
    on_press:
      - lambda: |-
          // Deprecated C++ compatibility path. Use refresh() in real configs.
          id(epd).flush();

  - platform: template
    name: Deprecated Flush Region
    on_press:
      - lambda: |-
          // Deprecated C++ compatibility path. Use refresh_region() in real configs.
          id(epd).flush_region(134, 413, 931, 773);

  - platform: template
    name: Deprecated Set Update Mode
    on_press:
      - lambda: |-
          // Deprecated C++ compatibility path. Use set_refresh_mode() in real configs.
          id(epd).set_update_mode(esphome::epaper_spectra6_133::UpdateMode::FULL);

binary_sensor:
  - platform: template
    name: Deprecated Busy State
    lambda: |-
      // Deprecated C++ compatibility path. Use is_processing() in real configs.
      return id(epd).is_busy();
