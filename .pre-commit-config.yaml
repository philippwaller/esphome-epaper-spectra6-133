repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: requirements-txt-fixer
      - id: check-executables-have-shebangs
        files: ^scripts/
      - id: check-yaml
        args: [--allow-multiple-documents, --unsafe]
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-merge-conflict
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        args: [-ignore, 'label ".+" is unknown']
        files: ^\.github/workflows/.*\.(yaml|yml)$
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        files: ^(.*\.(yaml|yml)|\.clang-format)$
        args: [--strict]
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: ^scripts/(.*\.sh|esphomew)$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.5
    hooks:
      - id: clang-format
        files: ^(components/.*\.(c|cc|cpp|cxx|h|hh|hpp)|ref/GDEP133C02/main/.*\.(c|h))$
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        args: [--fix]
        files: ^(CONTRIBUTING\.md|SECURITY\.md)$
  - repo: local
    hooks:
      - id: sync-agent-instructions
        name: check generated agent instruction files
        entry: bash ./scripts/sync-agent-instructions.sh --check
        language: system
        pass_filenames: false
        files: ^(AGENTS\.md|CLAUDE\.md|GEMINI\.md|\.github/copilot-instructions\.md|scripts/sync-agent-instructions\.sh)$
      - id: check-documented-esphome-compatibility
        name: check documented ESPHome compatibility matches requirements.txt
        description: >-
          Fails when this repository's documented ESPHome compatibility in
          README.md or CONTRIBUTING.md is not in sync with requirements.txt.
        entry: ./.venv/bin/python scripts/esphome-versions.py sync --check
        language: system
        pass_filenames: false
        files: ^(requirements\.txt|README\.md|CONTRIBUTING\.md|scripts/esphome-versions\.py)$
      - id: test-esphome-versions
        name: test ESPHome support version script
        entry: ./.venv/bin/python -m unittest discover -s tests -p test_*.py
        language: system
        pass_filenames: false
        stages: [manual]
        files: ^(README\.md|CONTRIBUTING\.md|requirements\.txt|scripts/esphome-versions\.py|tests/test_esphome_versions\.py)$
      - id: validate-configs
        name: validate ESPHome configs
        entry: bash ./scripts/validate-configs.sh
        language: system
        pass_filenames: false
        stages: [manual]
        files: |
          (?x)^(
            \.python-version|
            requirements(-dev)?\.txt|
            components/epaper_spectra6_133/.*\.(py|c|cc|cpp|cxx|h|hh|hpp)|
            configs/.*\.(yaml|yml)|
            packages/.*\.(yaml|yml)|
            configs/partitions/.*|
            scripts/(esphomew|setup\.sh|validate-configs\.sh|compile-configs\.sh|esphome-versions\.py)
          )$
      - id: run-host-tests
        name: run host-side tests
        entry: bash ./scripts/run-host-tests.sh
        language: system
        pass_filenames: false
        stages: [manual]
        files: |
          (?x)^(
            \.python-version|
            \.clang-format|
            requirements-dev\.txt|
            components/epaper_spectra6_133/.*\.(c|cc|cpp|cxx|h|hh|hpp)|
            tests/.*\.(c|cc|cpp|cxx|h|hh|hpp)|
            tests/CMakeLists\.txt|
            scripts/(setup\.sh|run-host-tests\.sh)
          )$
