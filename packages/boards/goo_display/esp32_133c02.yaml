---
esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "${task_wdt_timeout_s}"
psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false
logger:
  hardware_uart: UART0
  baud_rate: 115200
  level: INFO
  logs:
    epaper_spectra6_133: INFO
substitutions:
  # Task watchdog timeout in seconds (5–60). Increase to 60 when using PNG
  # images with online_image — the pngle decoder blocks the loop task for
  # longer than the default 5s on large images.
  task_wdt_timeout_s: "5"
  epd_clk_pin: '9'
  epd_data0_pin: '41'
  epd_data1_pin: '40'
  epd_cs0_pin: '18'
  epd_cs1_pin: '17'
  epd_busy_pin: '7'
  epd_reset_pin: '6'
  epd_power_pin: '45'
