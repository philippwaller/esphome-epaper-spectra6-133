name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
permissions:
  actions: read
  contents: read
  pull-requests: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_all: >-
        ${{ github.event_name == 'push' ||
            github.event_name == 'merge_group' ||
            github.event_name == 'workflow_dispatch' }}
      ci: ${{ steps.filter.outputs.ci }}
      python: ${{ steps.filter.outputs.python }}
      cpp: ${{ steps.filter.outputs.cpp }}
      esphome_configs: ${{ steps.filter.outputs.esphome_configs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ci:
              - '.github/workflows/**/*.{yml,yaml}'
              - '.github/actions/**/*.{yml,yaml}'
            python:
              - 'components/epaper_spectra6_133/**/*.py'
            cpp:
              - '.clang-format'
              - 'components/epaper_spectra6_133/**/*.{c,cc,cpp,cxx,h,hh,hpp}'
              - 'tests/**/*.{c,cc,cpp,cxx,h,hh,hpp}'
              - 'tests/CMakeLists.txt'
              - 'BENCHMARKS.md'
              - 'requirements-dev.txt'
              - 'scripts/setup.sh'
              - 'scripts/run-benchmarks.sh'
              - 'scripts/run-host-tests.sh'
            esphome_configs:
              - 'configs/**/*.{yaml,yml}'
              - 'packages/**/*.{yaml,yml}'
              - 'partitions/**/*'
              - 'requirements.txt'
              - 'requirements-dev.txt'
              - 'components/epaper_spectra6_133/**/*.{py,c,cc,cpp,cxx,h,hh,hpp}'
              - '.github/actions/**/*.{yml,yaml}'
              - 'scripts/esphomew'
              - 'scripts/setup.sh'
              - 'scripts/validate-configs.sh'
              - 'scripts/compile-configs.sh'
              - 'scripts/esphome-versions.py'

  esphome-compatibility:
    name: ESPHome Compatibility Window
    needs: changes
    if: >-
      needs.changes.outputs.run_all == 'true' ||
      needs.changes.outputs.esphome_configs == 'true' ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.cpp == 'true' ||
      needs.changes.outputs.ci == 'true'
    uses: ./.github/workflows/esphome-compatibility.yml
    with:
      run_mode: compatibility-window

  lint:
    name: Lint and Format Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-env
        with:
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Restore pre-commit hook environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Set up local developer environment
        run: bash ./scripts/setup.sh
      - name: Run pre-commit checks
        run: ./.venv/bin/pre-commit run --all-files --show-diff-on-failure

  cpp-tests:
    name: Host C++ Tests
    needs: changes
    if: needs.changes.outputs.run_all == 'true' || needs.changes.outputs.cpp == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-env
        with:
          cache-dependency-path: requirements-dev.txt
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Run host tests and build coverage report
        run: bash ./scripts/run-host-tests.sh
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: host-cpp-coverage
          path: build/coverage
          if-no-files-found: ignore

  cpp-benchmarks:
    name: Host C++ Benchmarks
    needs: changes
    if: >-
      github.event_name != 'pull_request' &&
      (needs.changes.outputs.run_all == 'true' ||
       needs.changes.outputs.cpp == 'true' ||
       needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write
    env:
      BENCHMARK_RESULTS: build/benchmarks/results.json
      BENCHER_PROJECT: ${{ vars.BENCHER_PROJECT }}
      BENCHER_API_KEY: ${{ secrets.BENCHER_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - name: Run host benchmarks
        run: bash ./scripts/run-benchmarks.sh --output "${BENCHMARK_RESULTS}"
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: host-cpp-benchmark-results
          path: ${{ env.BENCHMARK_RESULTS }}
          if-no-files-found: error
      - name: Install Bencher CLI
        if: github.event_name == 'push' && env.BENCHER_PROJECT != '' && env.BENCHER_API_KEY != ''
        uses: bencherdev/bencher@main
      - name: Track main benchmarks with Bencher
        if: github.event_name == 'push' && env.BENCHER_PROJECT != '' && env.BENCHER_API_KEY != ''
        run: |
          bencher run \
            --project "$BENCHER_PROJECT" \
            --key "$BENCHER_API_KEY" \
            --branch main \
            --hash '${{ github.sha }}' \
            --testbed ubuntu-latest \
            --threshold-measure latency \
            --threshold-test percentage \
            --threshold-min-sample-size 5 \
            --threshold-max-sample-size 30 \
            --threshold-upper-boundary 0.30 \
            --thresholds-reset \
            --error-on-alert \
            --adapter cpp_google \
            --file "$BENCHMARK_RESULTS" \
            --github-actions '${{ secrets.GITHUB_TOKEN }}'
