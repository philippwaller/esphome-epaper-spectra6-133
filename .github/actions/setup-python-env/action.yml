name: Set up Python environment
description: Set up the repository Python runtime with optional pip caching.
inputs:
  cache-dependency-path:
    description: Dependency file paths used for pip cache keys.
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Set up Python
      if: inputs.cache-dependency-path == ''
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - name: Set up Python with pip cache
      if: inputs.cache-dependency-path != ''
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
        cache: pip
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
