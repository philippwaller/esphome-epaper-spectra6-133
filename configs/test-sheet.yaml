---
# Visual reference sheet for panel calibration and layout checks.
# The page shows typography, palette swatches, dither samples, contrast tests,
# and geometry primitives on a single 1200x1600 render.

substitutions:
  device_name: test-sheet
  friendly_name: Epaper Spectra 133 Test Sheet

packages:
  board: !include ../packages/boards/goo_display/esp32_133c02.yaml
  update_check: !include ../packages/update_check.yaml

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.psram: enabled
  on_boot:
    priority: -100
    then:
      - component.update: epd

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${friendly_name}
    password: "12345678"

captive_portal:

external_components:
  - source:
      # Local source used by this repository for development and CI.
      type: local
      path: ../components

      # In your own ESPHome config, use the released GitHub version instead:
      # type: git
      # url: https://github.com/philippwaller/esphome-epaper-spectra6-133
      # ref: v0.4.0  # x-release-please-version

# Fonts used by the reference sheet.
font:
  # Headings
  - file: gfonts://Montserrat@700
    id: font_title
    size: 64

  - file: gfonts://Montserrat@300
    id: font_subtitle
    size: 26

  - file: gfonts://Montserrat@600
    id: font_section
    size: 28

  # Spec data
  - file: gfonts://Roboto Mono@500
    id: font_spec_label
    size: 22

  - file: gfonts://Roboto Mono
    id: font_spec_value
    size: 22

  # Typography specimen sizes
  - file: gfonts://Roboto Mono
    id: font_t12
    size: 12

  - file: gfonts://Roboto Mono
    id: font_t16
    size: 16

  - file: gfonts://Roboto Mono
    id: font_t20
    size: 20

  - file: gfonts://Roboto Mono
    id: font_t26
    size: 26

  - file: gfonts://Roboto Mono
    id: font_t32
    size: 32

  - file: gfonts://Roboto Mono
    id: font_t48
    size: 48

  - file: gfonts://Roboto Mono
    id: font_t72
    size: 72

  # Swatch / contrast labels
  - file: gfonts://Roboto Mono
    id: font_label
    size: 18

# Display definition.
display:
  - platform: epaper_spectra6_133
    id: epd
    update_interval: never
    auto_clear_enabled: false
    cs0_pin: ${epd_cs0_pin}
    cs1_pin: ${epd_cs1_pin}
    clk_pin: ${epd_clk_pin}
    data0_pin: ${epd_data0_pin}
    data1_pin: ${epd_data1_pin}
    busy_pin: ${epd_busy_pin}
    reset_pin: ${epd_reset_pin}
    power_pin: ${epd_power_pin}
    lambda: |-
      const int W = it.get_width();   // 1200
      const int H = it.get_height();  // 1600

      // ── Palette ─────────────────────────────────────────────────────
      const Color BLK = Color(  0,   0,   0);
      const Color WHT = Color(255, 255, 255);
      const Color YEL = Color(255, 255,   0);
      const Color RED = Color(255,   0,   0);
      const Color BLU = Color(  0,   0, 255);
      const Color GRN = Color(  0, 255,   0);

      // ── Grid constants ──────────────────────────────────────────────
      const int mx = 60;           // horizontal margin
      const int sec_gap = 40;      // vertical gap between sections
      const int head_h = 46;       // section title → content

      it.fill(WHT);

      // ════════════════════════════════════════════════════════════════
      // §1  COLOUR ACCENT BAR (top)
      // ════════════════════════════════════════════════════════════════
      const int bar_h = 6;
      const int seg_w = W / 6;  // 200
      it.filled_rectangle(       0, 0, seg_w, bar_h, BLK);
      it.filled_rectangle(  seg_w, 0, seg_w, bar_h, YEL);
      it.filled_rectangle(2*seg_w, 0, seg_w, bar_h, RED);
      it.filled_rectangle(3*seg_w, 0, seg_w, bar_h, BLU);
      it.filled_rectangle(4*seg_w, 0, seg_w, bar_h, GRN);
      it.filled_rectangle(5*seg_w, 0, seg_w, bar_h, BLK);

      // ════════════════════════════════════════════════════════════════
      // §2  HEADER & SPECIFICATIONS
      // ════════════════════════════════════════════════════════════════
      it.print(mx, 44, id(font_title), BLK, TextAlign::TOP_LEFT, "EPAPER SPECTRA 133");
      it.print(mx, 118, id(font_subtitle), BLK, TextAlign::TOP_LEFT,
               "13.3\x22 Spectra 6 Panel \xe2\x80\x94 Reference and Visual Test Sheet");

      // Thin rule below header
      it.filled_rectangle(mx, 156, W - 2*mx, 2, BLK);

      // Spec grid — two columns, 4 rows each
      const int val_off = 190;     // label → value offset
      const int col1_x = mx;
      const int col2_x = 640;
      const int line_h = 30;
      int sy = 174;

      // Column 1
      it.print(col1_x, sy, id(font_spec_label), BLK, TextAlign::TOP_LEFT, "Resolution");
      it.print(col1_x + val_off, sy, id(font_spec_value), BLK, TextAlign::TOP_LEFT, "1200 \xc3\x97 1600 px");
      sy += line_h;
      it.print(col1_x, sy, id(font_spec_label), BLK, TextAlign::TOP_LEFT, "Pixel Density");
      it.print(col1_x + val_off, sy, id(font_spec_value), BLK, TextAlign::TOP_LEFT, "~150 PPI");
      sy += line_h;
      it.print(col1_x, sy, id(font_spec_label), BLK, TextAlign::TOP_LEFT, "Active Area");
      it.print(col1_x + val_off, sy, id(font_spec_value), BLK, TextAlign::TOP_LEFT, "202.8 \xc3\x97 270.4 mm");
      sy += line_h;
      it.print(col1_x, sy, id(font_spec_label), BLK, TextAlign::TOP_LEFT, "Colours");
      it.print(col1_x + val_off, sy, id(font_spec_value), BLK, TextAlign::TOP_LEFT, "6 (BLK WHT YEL RED BLU GRN)");

      // Column 2
      sy = 174;
      it.print(col2_x, sy, id(font_spec_label), BLK, TextAlign::TOP_LEFT, "Framebuffer");
      it.print(col2_x + val_off, sy, id(font_spec_value), BLK, TextAlign::TOP_LEFT, "960 KB (PSRAM)");
      sy += line_h;
      it.print(col2_x, sy, id(font_spec_label), BLK, TextAlign::TOP_LEFT, "Driver ICs");
      it.print(col2_x + val_off, sy, id(font_spec_value), BLK, TextAlign::TOP_LEFT, "2\xc3\x97 (600 cols each)");
      sy += line_h;
      it.print(col2_x, sy, id(font_spec_label), BLK, TextAlign::TOP_LEFT, "Interface");
      it.print(col2_x + val_off, sy, id(font_spec_value), BLK, TextAlign::TOP_LEFT, "SPI (Quad-capable)");
      sy += line_h;
      it.print(col2_x, sy, id(font_spec_label), BLK, TextAlign::TOP_LEFT, "Refresh");
      it.print(col2_x + val_off, sy, id(font_spec_value), BLK, TextAlign::TOP_LEFT, "~26 s (full)");

      // Divider below specs
      it.filled_rectangle(mx, 300, W - 2*mx, 1, BLK);

      // ════════════════════════════════════════════════════════════════
      // §3  TYPOGRAPHY SCALE
      // ════════════════════════════════════════════════════════════════
      int ty = 300 + sec_gap;  // 330
      it.print(mx, ty, id(font_section), BLK, TextAlign::TOP_LEFT, "TYPE SCALE");
      ty += head_h;  // 372

      it.print(mx, ty, id(font_t12), BLK, TextAlign::TOP_LEFT, "12px  Hamburgefonts 0123456789 ABCDEFG");
      ty += 20;
      it.print(mx, ty, id(font_t16), BLK, TextAlign::TOP_LEFT, "16px  Hamburgefonts 0123456789 ABCDEFG");
      ty += 24;
      it.print(mx, ty, id(font_t20), BLK, TextAlign::TOP_LEFT, "20px  Hamburgefonts 0123456789 ABCDEFG");
      ty += 28;
      it.print(mx, ty, id(font_t26), BLK, TextAlign::TOP_LEFT, "26px  Hamburgefonts 0123456789");
      ty += 36;
      it.print(mx, ty, id(font_t32), BLK, TextAlign::TOP_LEFT, "32px  Hamburgefonts 0123456789");
      ty += 44;
      it.print(mx, ty, id(font_t48), BLK, TextAlign::TOP_LEFT, "48px  Hamburgefonts 012345");
      ty += 60;
      it.print(mx, ty, id(font_t72), BLK, TextAlign::TOP_LEFT, "72px  Hamburgefonts");
      ty += 84;  // end of 72px text → ~668

      // ════════════════════════════════════════════════════════════════
      // UNIFIED SWATCH GRID — shared across §4, §5, §6
      // ════════════════════════════════════════════════════════════════
      const int grid_sw = 150;     // swatch width (uniform)
      const int grid_gap = 24;     // gap between swatches
      // total: 6*150 + 5*24 = 1020; start: (1200-1020)/2 = 90
      const int grid_x0 = (W - (6*grid_sw + 5*grid_gap)) / 2;

      const Color pal[] = {BLK, WHT, YEL, RED, BLU, GRN};
      const char *pal_names[] = {"Black", "White", "Yellow", "Red", "Blue", "Green"};
      const char *pal_hex[]   = {"#000000", "#FFFFFF", "#FFFF00", "#FF0000", "#0000FF", "#00FF00"};

      // ════════════════════════════════════════════════════════════════
      // §4  COLOUR PALETTE (full saturation)
      // ════════════════════════════════════════════════════════════════
      int py = ty + sec_gap;
      it.print(mx, py, id(font_section), BLK, TextAlign::TOP_LEFT, "NATIVE PALETTE");
      py += head_h;

      for (int i = 0; i < 6; i++) {
        int x = grid_x0 + i * (grid_sw + grid_gap);
        it.rectangle(x - 1, py - 1, grid_sw + 2, grid_sw + 2, BLK);
        it.filled_rectangle(x, py, grid_sw, grid_sw, pal[i]);
        it.print(x + grid_sw/2, py + grid_sw + 10, id(font_label), BLK, TextAlign::TOP_CENTER, pal_names[i]);
        it.print(x + grid_sw/2, py + grid_sw + 30, id(font_label), BLK, TextAlign::TOP_CENTER, pal_hex[i]);
      }
      int sec4_end = py + grid_sw + 50;

      // ════════════════════════════════════════════════════════════════
      // §5  50% DITHER PATTERNS
      // ════════════════════════════════════════════════════════════════
      int dy = sec4_end + sec_gap;
      it.print(mx, dy, id(font_section), BLK, TextAlign::TOP_LEFT, "50% DITHER SAMPLES");
      dy += head_h;

      const int dh = 80;  // dither swatch height

      for (int i = 0; i < 6; i++) {
        int x = grid_x0 + i * (grid_sw + grid_gap);
        it.rectangle(x - 1, dy - 1, grid_sw + 2, dh + 2, BLK);
        for (int row = 0; row < dh; row++) {
          Color c = (row % 2 == 0) ? pal[i] : WHT;
          it.filled_rectangle(x, dy + row, grid_sw, 1, c);
        }
        it.print(x + grid_sw/2, dy + dh + 10, id(font_label), BLK, TextAlign::TOP_CENTER, pal_names[i]);
      }
      int sec5_end = dy + dh + 30;

      // ════════════════════════════════════════════════════════════════
      // §6  CONTRAST: TEXT ON BACKGROUNDS
      // ════════════════════════════════════════════════════════════════
      int cy = sec5_end + sec_gap;
      it.print(mx, cy, id(font_section), BLK, TextAlign::TOP_LEFT, "TEXT CONTRAST");
      cy += head_h;

      struct ContrastPair { Color bg; Color fg; const char *text; };
      const ContrastPair pairs[] = {
        {BLK, WHT, "Wht/Blk"},
        {YEL, BLK, "Blk/Yel"},
        {RED, WHT, "Wht/Red"},
        {BLU, WHT, "Wht/Blu"},
        {GRN, WHT, "Wht/Grn"},
        {WHT, BLK, "Blk/Wht"},
      };

      const int ch = 80;  // contrast swatch height

      for (int i = 0; i < 6; i++) {
        int x = grid_x0 + i * (grid_sw + grid_gap);
        it.filled_rectangle(x, cy, grid_sw, ch, pairs[i].bg);
        if (i == 5) it.rectangle(x, cy, grid_sw, ch, BLK);
        it.print(x + grid_sw/2, cy + ch/2, id(font_label), pairs[i].fg,
                 TextAlign::CENTER, pairs[i].text);
      }
      int sec6_end = cy + ch;

      // ════════════════════════════════════════════════════════════════
      // §7  GEOMETRY & LINE WEIGHTS
      // ════════════════════════════════════════════════════════════════
      int gy = sec6_end + sec_gap;
      it.print(mx, gy, id(font_section), BLK, TextAlign::TOP_LEFT, "LINE WEIGHTS & SHAPES");
      gy += head_h;

      // Line weight samples (left column)
      const int lw_len = 200;
      const int weights[] = {1, 2, 3, 4, 6, 8};
      int lwy = gy;
      for (int i = 0; i < 6; i++) {
        it.filled_rectangle(mx, lwy, lw_len, weights[i], BLK);
        char buf[8];
        snprintf(buf, sizeof(buf), "%dpx", weights[i]);
        it.print(mx + lw_len + 10, lwy + weights[i] / 2, id(font_label), BLK, TextAlign::CENTER_LEFT, buf);
        lwy += weights[i] + 12;
      }

      // Geometric shapes (right area, fits within margins)
      const int ss = 64;  // shape size
      const int shape_x = 420;
      const int shape_y = gy;

      // Outlined shapes
      it.rectangle(shape_x, shape_y, ss, ss, BLK);
      it.circle(shape_x + ss + 60 + ss/2, shape_y + ss/2, ss/2, BLK);
      int tri_cx = shape_x + 2*(ss + 60) + ss/2;
      it.line(tri_cx, shape_y, tri_cx - ss/2, shape_y + ss, BLK);
      it.line(tri_cx, shape_y, tri_cx + ss/2, shape_y + ss, BLK);
      it.line(tri_cx - ss/2, shape_y + ss, tri_cx + ss/2, shape_y + ss, BLK);
      // Label
      int out_center = shape_x + (3*ss + 2*60) / 2;
      it.print(out_center, shape_y + ss + 10, id(font_label), BLK, TextAlign::TOP_CENTER, "Outline");

      // Filled shapes
      const int fs_x = 780;
      it.filled_rectangle(fs_x, shape_y, ss, ss, RED);
      it.filled_circle(fs_x + ss + 60 + ss/2, shape_y + ss/2, ss/2, BLU);
      int ftri_cx = fs_x + 2*(ss + 60) + ss/2;
      for (int row = 0; row < ss; row++) {
        int half_w = (row * ss) / (2 * ss);
        it.filled_rectangle(ftri_cx - half_w, shape_y + row, half_w * 2, 1, GRN);
      }
      // Label
      int fill_center = fs_x + (3*ss + 2*60) / 2;
      it.print(fill_center, shape_y + ss + 10, id(font_label), BLK, TextAlign::TOP_CENTER, "Solid");

      // ════════════════════════════════════════════════════════════════
      // §8  FOOTER ACCENT BAR
      // ════════════════════════════════════════════════════════════════
      const int fy = H - bar_h;
      it.filled_rectangle(       0, fy, seg_w, bar_h, BLK);
      it.filled_rectangle(  seg_w, fy, seg_w, bar_h, GRN);
      it.filled_rectangle(2*seg_w, fy, seg_w, bar_h, BLU);
      it.filled_rectangle(3*seg_w, fy, seg_w, bar_h, RED);
      it.filled_rectangle(4*seg_w, fy, seg_w, bar_h, YEL);
      it.filled_rectangle(5*seg_w, fy, seg_w, bar_h, BLK);

      // Attribution
      it.print(W/2, fy - 14, id(font_t20), BLK, TextAlign::BOTTOM_CENTER,
               "Rendered via ESPHome \xe2\x80\xa2 epaper_spectra6_133 external component");
