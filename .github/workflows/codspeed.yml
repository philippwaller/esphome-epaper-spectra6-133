name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # `workflow_dispatch` allows CodSpeed to trigger backtest
  # performance analysis in order to generate initial data.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Benchmark-Relevant Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_all: >-
        ${{ github.event_name == 'push' ||
            github.event_name == 'workflow_dispatch' }}
      benchmark: ${{ steps.filter.outputs.benchmark }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4
        id: filter
        with:
          filters: |
            benchmark:
              - '.github/workflows/codspeed.yml'
              - 'components/epaper_spectra6_133/**/*.{c,cc,cpp,cxx,h,hh,hpp}'
              - 'tests/CMakeLists.txt'
              - 'tests/benchmarks/**/*.{c,cc,cpp,cxx,h,hh,hpp}'
              - 'tests/support/**/*.{c,cc,cpp,cxx,h,hh,hpp}'

  codspeed:
    name: Run CodSpeed Benchmarks
    needs: changes
    if: needs.changes.outputs.run_all == 'true' || needs.changes.outputs.benchmark == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Build benchmarks
        run: |
          cmake -S tests -B build/codspeed \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_TESTING=OFF \
            -DENABLE_BENCHMARKS=ON \
            -DCODSPEED_MODE=simulation
          cmake --build build/codspeed \
            --target epaper_spectra6_133_benchmarks \
            --config RelWithDebInfo

      - name: Run CodSpeed benchmarks
        uses: CodSpeedHQ/action@9d332c4d90b43981c3e55ae8e38e68709996240f  # v4
        with:
          mode: simulation
          run: ./build/codspeed/epaper_spectra6_133_benchmarks
