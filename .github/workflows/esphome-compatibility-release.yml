name: ESPHome Compatibility Release Watch
"on":
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: esphome-compatibility-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-check:
    name: Watch Latest ESPHome Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      artifact_name: ${{ steps.artifact.outputs.name }}
      changed: ${{ steps.compare.outputs.changed }}
      current_version: ${{ steps.current.outputs.current_version }}
      current_version_set: ${{ steps.current.outputs.version_set }}
      current_version_set_hash: ${{ steps.current.outputs.version_set_hash }}
      previous_version: ${{ steps.previous.outputs.previous_version }}
      previous_version_set_hash: ${{ steps.previous.outputs.version_set_hash }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: ./.github/actions/setup-python-env
      - name: Install script dependencies
        run: pip install --disable-pip-version-check "packaging>=24"
      - name: Resolve artifact name
        id: artifact
        run: |
          ref_hash="$(echo -n "$GITHUB_REF" | sha256sum | cut -c1-8)"
          echo "name=validated-esphome-versions-${ref_hash}" >> "$GITHUB_OUTPUT"
      - name: Resolve ESPHome version set
        id: current
        run: |
          mkdir -p artifacts
          python scripts/esphome-versions.py snapshot --include-prereleases > artifacts/resolved-version-set.json
          current_version="$(
            python -c 'import json; print(json.load(open("artifacts/resolved-version-set.json", encoding="utf-8"))["latest_version"])'
          )"
          version_set_hash="$(
            python -c 'import json; print(json.load(open("artifacts/resolved-version-set.json", encoding="utf-8"))["version_set_hash"])'
          )"
          version_set="$(
            python -c 'import json; print(json.dumps(json.load(open("artifacts/resolved-version-set.json", encoding="utf-8")), sort_keys=True, separators=(",", ":")))'
          )"

          {
            echo "current_version=${current_version}"
            echo "version_set_hash=${version_set_hash}"
            echo "version_set=${version_set}"
          } >> "$GITHUB_OUTPUT"
          echo "Current ESPHome latest version: ${current_version}"
          echo "Current ESPHome version set hash: ${version_set_hash}"
      - name: Download previous validated ESPHome version set artifact
        id: previous
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_NAME: ${{ steps.artifact.outputs.name }}
        run: |
          mkdir -p previous-artifact
          artifact_url="$(
            gh api --method GET "repos/${GITHUB_REPOSITORY}/actions/artifacts" -f "name=${ARTIFACT_NAME}" -f per_page=100 \
              --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].archive_download_url // ""'
          )"

          if [[ -z "${artifact_url}" ]]; then
            echo "No previous ${ARTIFACT_NAME} artifact found."
            echo "previous_version=" >> "$GITHUB_OUTPUT"
            echo "version_set_hash=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -L "${artifact_url}" \
            -o previous-artifact.zip
          unzip -q -o previous-artifact.zip -d previous-artifact

          previous_file="$(find previous-artifact -type f -name resolved-version-set.json | head -n 1)"
          if [[ -z "${previous_file}" ]]; then
            echo "Previous artifact did not contain resolved-version-set.json."
            echo "previous_version=" >> "$GITHUB_OUTPUT"
            echo "version_set_hash=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous_version="$(
            python -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("latest_version", ""))' "${previous_file}"
          )"
          version_set_hash="$(
            python -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("version_set_hash", ""))' "${previous_file}"
          )"
          {
            echo "previous_version=${previous_version}"
            echo "version_set_hash=${version_set_hash}"
          } >> "$GITHUB_OUTPUT"
          echo "Previous ESPHome latest version: ${previous_version}"
          echo "Previous ESPHome version set hash: ${version_set_hash}"
      - name: Compare ESPHome version sets
        id: compare
        env:
          CURRENT_VERSION: ${{ steps.current.outputs.current_version }}
          PREVIOUS_VERSION: ${{ steps.previous.outputs.previous_version }}
          CURRENT_VERSION_SET_HASH: ${{ steps.current.outputs.version_set_hash }}
          PREVIOUS_VERSION_SET_HASH: ${{ steps.previous.outputs.version_set_hash }}
        run: |
          if [[ -z "${PREVIOUS_VERSION_SET_HASH}" || "${CURRENT_VERSION_SET_HASH}" != "${PREVIOUS_VERSION_SET_HASH}" ]]; then
            changed="true"
          else
            changed="false"
          fi

          echo "changed=${changed}" >> "$GITHUB_OUTPUT"
          echo "Previous latest ESPHome version: ${PREVIOUS_VERSION:-none}"
          echo "Current latest ESPHome version: ${CURRENT_VERSION}"
          echo "Version set changed: ${changed}"

  esphome-compatibility:
    name: Run Release Compatibility
    needs: version-check
    if: needs.version-check.outputs.changed == 'true'
    uses: ./.github/workflows/esphome-compatibility.yml
    with:
      run_mode: compatibility-window
      include_prereleases: true

  record-validated-version-set:
    name: Record Validated ESPHome Version Set
    needs:
      - version-check
      - esphome-compatibility
    if: needs.version-check.outputs.changed == 'true' && needs.esphome-compatibility.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Write validated ESPHome version set artifact
        env:
          VERSION_SET_JSON: ${{ needs.version-check.outputs.current_version_set }}
        run: |
          mkdir -p artifacts
          printf '%s\n' "${VERSION_SET_JSON}" > artifacts/resolved-version-set.json
      - name: Upload validated ESPHome version set artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: ${{ needs.version-check.outputs.artifact_name }}
          path: artifacts/resolved-version-set.json
          if-no-files-found: error
